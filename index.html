<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chấm Công Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --success: #34a853; --danger: #ea4335; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f8f9fa; }
        .container { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 1.5rem; border: 2px solid #eee; border-radius: 12px; font-size: 18px; text-align: center; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--primary); }
        .btn-group { display: flex; gap: 15px; }
        button { flex: 1; padding: 18px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 17px; transition: 0.2s; }
        .btn-in { background-color: var(--success); }
        .btn-out { background-color: var(--danger); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        /* POPUP LAYER */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .popup { background: white; padding: 30px; border-radius: 25px; width: 85%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3); animation: popShow 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.28); }
        @keyframes popShow { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .pop-title { font-size: 26px; font-weight: bold; margin-bottom: 15px; }
        .pop-msg { font-size: 18px; color: #444; margin-bottom: 25px; line-height: 1.6; }
        .pop-btn-ok { background: var(--primary); color: white; width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; }
        .pop-btn-cancel { background: #f1f1f1; color: #333; padding: 12px 20px; border-radius: 8px; border: none; margin-top: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--primary); margin-bottom: 20px;">MÁY CHẤM CÔNG</h2>
    <input type="text" id="userInput" placeholder="Nhập ID hoặc SĐT..." oninput="verifyUser()" autocomplete="off">
    <div id="welcomeMsg" style="font-weight: bold; margin-bottom: 1.5rem; color: #999;">Đang tải dữ liệu...</div>
    
    <div class="btn-group">
        <button id="btnIn" class="btn-in" onclick="handleLogic('VÀO LÀM')" disabled>VÀO LÀM</button>
        <button id="btnOut" class="btn-out" onclick="handleLogic('RA VỀ')" disabled>RA VỀ</button>
    </div>
</div>

<div id="popupOverlay" class="overlay">
    <div class="popup" id="popupInner"></div>
</div>

<script>
    // --- CẤU HÌNH ---
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTUg_iywqM2LI-05k_0pBiN1031ZjfRpz_bpT9elmzsG9_bxXoYe3Lu6zE8XJ-6Q1q8VXLtXbS9Wtxq/pub?gid=1711800207&single=true&output=csv';
    const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLScLa2wRfX1H-VWXbBgcV6ibK_rcTHzz7LjtYbe4e0lLlulztw/formResponse';
    const ENTRY_PHONE = 'entry.1427933739'; 
    const ENTRY_ID = 'entry.1524972538';
    const ENTRY_ACTION = 'entry.1196977499';

    let userData = [], currentUser = null;

    // 1. Tải danh sách nhân viên trước
    Papa.parse(CSV_URL, {
        download: true, 
        header: true, 
        skipEmptyLines: true,
        complete: r => { 
            userData = r.data; 
            document.getElementById('welcomeMsg').innerText = "Sẵn sàng! Nhập ID của bạn";
            // Check tự động điền ID sau khi data đã load xong
            const saved = localStorage.getItem('lastID');
            if(saved) { 
                document.getElementById('userInput').value = saved; 
                verifyUser(); 
            }
        }
    });

    function verifyUser() {
        const val = document.getElementById('userInput').value.trim();
        const msg = document.getElementById('welcomeMsg');
        const btns = [document.getElementById('btnIn'), document.getElementById('btnOut')];
        
        if (!userData.length) return;

        // Tìm khớp ID hoặc SĐT (Lưu ý: Tên cột trong Sheet phải là ID và SĐT)
        currentUser = userData.find(u => String(u.ID).trim() === val || String(u.SĐT).trim() === val);

        if (currentUser) {
            msg.innerText = "Xin chào, " + currentUser.Tên;
            msg.style.color = "var(--primary)";
            btns.forEach(b => b.disabled = false);
        } else {
            msg.innerText = "Chưa nhận diện được...";
            msg.style.color = "#999";
            btns.forEach(b => b.disabled = true);
        }
    }

    function handleLogic(action) {
        const now = new Date();
        const today = now.toLocaleDateString('vi-VN');
        const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        const userKey = currentUser.ID || currentUser.SĐT;

        const lastAction = localStorage.getItem(`status_${userKey}`);
        const lastDate = localStorage.getItem(`date_${userKey}`);
        const lastTime = localStorage.getItem(`time_${userKey}`);

        // Logic check trùng bằng Cookie
        if (lastDate === today) {
            if (action === 'VÀO LÀM' && lastAction === 'VÀO LÀM') {
                renderPopup(`
                    <div class="pop-title" style="color:var(--danger)">Thông báo</div>
                    <div class="pop-msg">Hôm nay <b>${currentUser.Tên}</b> đã chấm VÀO lúc ${lastTime}. <br>Bạn vẫn muốn chấm VÀO lần nữa?</div>
                    <button class="pop-btn-ok" onclick="submitData('${action}')">CÓ, TIẾP TỤC</button>
                    <button class="pop-btn-cancel" onclick="closePopup()">KHÔNG</button>
                `);
                return;
            }
            if (action === 'RA VỀ' && lastAction !== 'VÀO LÀM') {
                renderPopup(`
                    <div class="pop-title" style="color:var(--danger)">Cảnh báo</div>
                    <div class="pop-msg">Hôm nay bạn chưa chấm VÀO. <br>Bạn vẫn muốn tiếp tục chấm RA?</div>
                    <button class="pop-btn-ok" onclick="submitData('${action}')">VẪN CHẤM RA</button>
                    <button class="pop-btn-cancel" onclick="closePopup()">QUAY LẠI</button>
                `);
                return;
            }
        }
        submitData(action);
    }

    function submitData(action) {
        closePopup();
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        const input = document.getElementById('userInput').value.trim();
        const userKey = currentUser.ID || currentUser.SĐT;
        
        const params = new URLSearchParams();
        if (String(currentUser.ID).trim() === input) { params.append(ENTRY_ID, input); params.append(ENTRY_PHONE, ""); }
        else { params.append(ENTRY_PHONE, input); params.append(ENTRY_ID, ""); }
        params.append(ENTRY_ACTION, action);

        fetch(FORM_URL, { method: 'POST', mode: 'no-cors', body: params }).then(() => {
            // Lưu Cookie
            localStorage.setItem('lastID', input);
            localStorage.setItem(`status_${userKey}`, action);
            localStorage.setItem(`date_${userKey}`, now.toLocaleDateString('vi-VN'));
            localStorage.setItem(`time_${userKey}`, timeStr);

            renderPopup(`
                <div class="pop-title" style="color:var(--success)">THÀNH CÔNG!</div>
                <div class="pop-msg">
                    <b>${currentUser.Tên}</b><br>
                    Đã chấm <b>${action}</b> thành công<br>
                    Lúc: <span style="font-size:24px; font-weight:bold">${timeStr}</span>
                </div>
                <button class="pop-btn-ok" onclick="location.reload()">ĐÓNG</button>
            `);
        });
    }

    function renderPopup(html) {
        document.getElementById('popupInner').innerHTML = html;
        document.getElementById('popupOverlay').style.display = 'flex';
    }

    function closePopup() {
        document.getElementById('popupOverlay').style.display = 'none';
    }
</script>

</body>
</html>
