<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chấm Công Siêu Tốc</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --success: #34a853; --danger: #ea4335; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f8f9fa; }
        .container { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 1.5rem; border: 2px solid #eee; border-radius: 12px; font-size: 18px; text-align: center; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        .btn-group { display: flex; gap: 15px; }
        button { flex: 1; padding: 18px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 17px; transition: 0.2s; }
        .btn-in { background-color: var(--success); }
        .btn-out { background-color: var(--danger); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        /* POPUP CHÍNH */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .popup { background: white; padding: 30px; border-radius: 20px; width: 85%; max-width: 380px; text-align: center; animation: popShow 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.28); }
        @keyframes popShow { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .pop-title { font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        .pop-msg { font-size: 16px; color: #444; margin-bottom: 25px; line-height: 1.6; }
        .pop-btn-confirm { background: var(--primary); color: white; padding: 12px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin: 5px; }
        .pop-btn-cancel { background: #f1f1f1; color: #333; padding: 12px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--primary); margin-bottom: 20px;">MÁY CHẤM CÔNG</h2>
    <input type="text" id="userInput" placeholder="Nhập ID hoặc SĐT..." oninput="verifyUser()" autocomplete="off">
    <div id="welcomeMsg" style="font-weight: bold; margin-bottom: 1.5rem; color: #666;">Vui lòng nhập mã...</div>
    
    <div class="btn-group">
        <button id="btnIn" class="btn-in" onclick="handleLogic('VÀO LÀM')" disabled>VÀO LÀM</button>
        <button id="btnOut" class="btn-out" onclick="handleLogic('RA VỀ')" disabled>RA VỀ</button>
    </div>
</div>

<div id="popupOverlay" class="overlay">
    <div class="popup" id="popupInner"></div>
</div>

<script>
    // --- CẤU HÌNH ---
    const CSV_URL = 'LINK_CSV_CỦA_ÔNG_VÀO_ĐÂY';
    const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLScLa2wRfX1H-VWXbBgcV6ibK_rcTHzz7LjtYbe4e0lLlulztw/formResponse';
    const ENTRY_PHONE = 'entry.1427933739'; 
    const ENTRY_ID = 'entry.1524972538';
    const ENTRY_ACTION = 'entry.1196977499';

    let userData = [], currentUser = null;

    // Load danh sách NV
    Papa.parse(CSV_URL, {
        download: true, header: true, 
        complete: r => { 
            userData = r.data; 
            const saved = localStorage.getItem('lastID');
            if(saved) { document.getElementById('userInput').value = saved; verifyUser(); }
        }
    });

    function verifyUser() {
        const val = document.getElementById('userInput').value.trim();
        currentUser = userData.find(u => u.SĐT === val || u.ID === val);
        const msg = document.getElementById('welcomeMsg');
        const btns = [document.getElementById('btnIn'), document.getElementById('btnOut')];
        
        if (currentUser) {
            msg.innerText = "Xin chào, " + currentUser.Tên;
            msg.style.color = "var(--primary)";
            btns.forEach(b => b.disabled = false);
        } else {
            msg.innerText = "Chưa nhận diện được...";
            msg.style.color = "#999";
            btns.forEach(b => b.disabled = true);
        }
    }

    function handleLogic(action) {
        const now = new Date();
        const today = now.toLocaleDateString('vi-VN');
        const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        
        // Kiểm tra Cookies (localStorage)
        const lastAction = localStorage.getItem(`status_${currentUser.ID || currentUser.SĐT}`);
        const lastDate = localStorage.getItem(`date_${currentUser.ID || currentUser.SĐT}`);
        const lastTime = localStorage.getItem(`time_${currentUser.ID || currentUser.SĐT}`);

        // Nếu cùng ngày và bấm trùng hành động (Vào lại hoặc chưa Vào đã Ra)
        if (lastDate === today) {
            if (action === 'VÀO LÀM' && lastAction === 'VÀO LÀM') {
                showConfirmPopup(`Thông báo`, `Hôm nay (${today}), <b>${currentUser.Tên}</b> đã chấm VÀO lúc ${lastTime}. <br>Bạn muốn chấm VÀO thêm lần nữa không?`, action);
                return;
            }
            if (action === 'RA VỀ' && lastAction !== 'VÀO LÀM') {
                showConfirmPopup(`Cảnh báo`, `Hôm nay bạn chưa chấm VÀO. <br>Bạn vẫn muốn tiếp tục chấm RA?`, action);
                return;
            }
        }
        
        submitData(action);
    }

    function submitData(action) {
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        const input = document.getElementById('userInput').value.trim();
        
        const params = new URLSearchParams();
        if (currentUser.ID === input) { params.append(ENTRY_ID, input); params.append(ENTRY_PHONE, ""); }
        else { params.append(ENTRY_PHONE, input); params.append(ENTRY_ID, ""); }
        params.append(ENTRY_ACTION, action);

        fetch(FORM_URL, { method: 'POST', mode: 'no-cors', body: params }).then(() => {
            // Lưu trạng thái vào Cookies máy này
            localStorage.setItem('lastID', input);
            localStorage.setItem(`status_${input}`, action);
            localStorage.setItem(`date_${input}`, now.toLocaleDateString('vi-VN'));
            localStorage.setItem(`time_${input}`, timeStr);

            showSuccessPopup(action, timeStr);
        });
    }

    function showConfirmPopup(title, msg, action) {
        const html = `
            <div class="pop-title" style="color:var(--danger)">${title}</div>
            <div class="pop-msg">${msg}</div>
            <button class="pop-btn-confirm" onclick="submitData('${action}')">CÓ, TIẾP TỤC</button>
            <button class="pop-btn-cancel" onclick="closePopup()">KHÔNG</button>
        `;
        renderPopup(html);
    }

    function showSuccessPopup(action, time) {
        const html = `
            <div class="pop-title" style="color:var(--success)">THÀNH CÔNG!</div>
            <div class="pop-msg">
                <b>${currentUser.Tên}</b><br>
                Đã chấm <b>${action}</b> thành công<br>
                Vào lúc: <span style="font-size:22px; color:#000">${time}</span>
            </div>
            <button class="pop-btn-confirm" style="width:100%" onclick="location.reload()">ĐÓNG</button>
        `;
        renderPopup(html);
    }

    function renderPopup(html) {
        document.getElementById('popupInner').innerHTML = html;
        document.getElementById('popupOverlay').style.display = 'flex';
    }

    function closePopup() {
        document.getElementById('popupOverlay').style.display = 'none';
    }
</script>

</body>
</html>
